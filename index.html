<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
    <title>My Library</title>
</head>
<body>
<div class="navSection">
    <p class="totalBooks">Total Books:</p>
    <p class="booksRead">Books Read:</p>
</div>
<div style="width: 80%">
    <div class="header">
        <h1 class="title">Welcome to the Library.</h1>
    </div>
    <section class="mainSection">

    </section>
</div>
<footer>
    <div class="form-container">
        <div class="form">
            <h1>Add Book</h1>
            <div class="inputDiv">
            <label for="title">Title</label>
            <input id="title" type="text" placeholder="Enter Title" name="title">
            </div>
            <div class="inputDiv">
                <label for="author">Author</label>
                <input id="author" type="text" placeholder="Enter Author" name="author" >

            </div>
            <div class="inputDiv">
                <label for="pages">Pages</label>
                <input id="pages" type="text" placeholder="Enter Pages" name="pages" >
            </div>
            <div id="formCheck">
                <p>Read?</p>
                <input id="readCheckBox" type="checkbox" style="height: 20px; width: 20px">
            </div>
            <button id="addBookBtn">Add</button>
        </div>
    </div>
</footer>
</body>
</html>
